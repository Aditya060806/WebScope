openapi: "3.1.0"
info:
  title: WebScope API
  description: Text-grid web browser for AI agents — REST API
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: Aditya Pandey
    email: aditya060806@gmail.com

servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Server status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  timestamp: { type: string }
                  browser: { type: string }

  /navigate:
    post:
      summary: Navigate to a URL
      operationId: navigate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url: { type: string, description: URL to navigate to }
                headers: { type: object, description: Custom HTTP headers }
                device: { type: string, description: "Device profile (e.g., iphone14, pixel7)" }
                proxy: { type: string, description: HTTP/SOCKS proxy URL }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /click:
    post:
      summary: Click an element by ref
      operationId: click
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ref]
              properties:
                ref: { type: integer, description: Element reference number }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /type:
    post:
      summary: Type text into an input
      operationId: typeText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ref, text]
              properties:
                ref: { type: integer }
                text: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /select:
    post:
      summary: Select a dropdown option
      operationId: selectOption
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ref, value]
              properties:
                ref: { type: integer }
                value: { type: string }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /scroll:
    post:
      summary: Scroll the page
      operationId: scroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                direction: { type: string, enum: [up, down, top] }
                amount: { type: integer, default: 1 }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /press:
    post:
      summary: Press a keyboard key
      operationId: pressKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key]
              properties:
                key: { type: string, description: "Key name (Enter, Tab, Escape, etc.)" }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /upload:
    post:
      summary: Upload a file to a file input
      operationId: uploadFile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ref, files]
              properties:
                ref: { type: integer }
                files: { oneOf: [{ type: string }, { type: array, items: { type: string } }] }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /snapshot:
    get:
      summary: Get current page snapshot
      operationId: getSnapshot
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /evaluate:
    post:
      summary: Execute JavaScript in the page
      operationId: evaluate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [script]
              properties:
                script: { type: string, description: JavaScript expression }
      responses:
        "200":
          description: Evaluation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  result: {}

  /batch:
    post:
      summary: Execute multiple actions in sequence
      operationId: batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [actions]
              properties:
                actions:
                  type: array
                  items:
                    type: object
                    required: [action]
                    properties:
                      action: { type: string, enum: [navigate, click, type, select, scroll, press, upload, snapshot, waitFor, evaluate] }
                      params: { type: object }
      responses:
        "200":
          description: Batch results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  completed: { type: integer }
                  total: { type: integer }
                  steps: { type: array }

  /diff:
    get:
      summary: Diff current vs previous snapshot
      operationId: getDiff
      responses:
        "200":
          description: Element diff
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  added: { type: object }
                  removed: { type: object }
                  changed: { type: object }
                  summary: { type: object }

  /find:
    post:
      summary: Semantic element search
      operationId: findElements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string, description: Natural language search query }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  matches: { type: array }

  /headers:
    post:
      summary: Set session-level HTTP headers
      operationId: setHeaders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [headers]
              properties:
                headers: { type: object }
      responses:
        "200":
          description: Headers set
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /devices:
    get:
      summary: List available device profiles
      operationId: getDevices
      responses:
        "200":
          description: Device list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  devices: { type: array }

  /network:
    get:
      summary: Get network request/response log
      operationId: getNetwork
      parameters:
        - name: type
          in: query
          schema: { type: string, enum: [request, response] }
        - name: resourceType
          in: query
          schema: { type: string }
        - name: urlPattern
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Network log
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  count: { type: integer }
                  entries: { type: array }
    delete:
      summary: Clear network log
      operationId: clearNetwork
      responses:
        "200":
          description: Log cleared

  /record/start:
    post:
      summary: Start recording actions
      operationId: recordStart
      responses:
        "200":
          description: Recording started

  /record/stop:
    post:
      summary: Stop recording actions
      operationId: recordStop
      responses:
        "200":
          description: Recording stopped

  /record/export:
    get:
      summary: Export recorded actions
      operationId: recordExport
      responses:
        "200":
          description: Recorded actions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  actions: { type: array }

  /replay:
    post:
      summary: Replay recorded actions
      operationId: replay
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                actions: { type: array, description: "Actions to replay (omit to replay last recording)" }
      responses:
        "200":
          description: Replay results

  /query:
    post:
      summary: Query elements by CSS selector
      operationId: queryElements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [selector]
              properties:
                selector: { type: string }
      responses:
        "200":
          description: Query results

  /region:
    post:
      summary: Read text from grid region
      operationId: readRegion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [r1, c1, r2, c2]
              properties:
                r1: { type: integer }
                c1: { type: integer }
                r2: { type: integer }
                c2: { type: integer }
      responses:
        "200":
          description: Region text

  /waitFor:
    post:
      summary: Wait for a condition
      operationId: waitFor
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selector: { type: string }
                text: { type: string }
                urlIncludes: { type: string }
                state: { type: string, enum: [attached, detached, visible, hidden] }
                timeoutMs: { type: integer }
      responses:
        "200":
          $ref: "#/components/responses/SnapshotResponse"

  /assertField:
    post:
      summary: Assert a field value
      operationId: assertField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ref, expected]
              properties:
                ref: { type: integer }
                expected: { type: string }
                comparator: { type: string, enum: [equals, includes, regex, not_empty] }
                attribute: { type: string }
      responses:
        "200":
          description: Assertion result

  /saveState:
    post:
      summary: Save browser storage state
      operationId: saveState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: State saved

  /loadState:
    post:
      summary: Load browser storage state
      operationId: loadState
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path: { type: string }
      responses:
        "200":
          description: State loaded

  /screenshot:
    post:
      summary: Take a screenshot
      operationId: takeScreenshot
      responses:
        "200":
          description: PNG screenshot
          content:
            image/png:
              schema:
                type: string
                format: binary

  /metrics:
    get:
      summary: Prometheus metrics
      operationId: getMetrics
      responses:
        "200":
          description: Metrics in Prometheus text format
          content:
            text/plain:
              schema:
                type: string

  /close:
    post:
      summary: Close browser
      operationId: closeBrowser
      responses:
        "200":
          description: Browser closed

components:
  responses:
    SnapshotResponse:
      description: Page snapshot with text grid and element map
      content:
        application/json:
          schema:
            type: object
            properties:
              success: { type: boolean }
              view: { type: string, description: Text grid rendering of the page }
              elements: { type: object, description: Map of ref numbers to element metadata }
              meta:
                type: object
                properties:
                  url: { type: string }
                  title: { type: string }
                  totalRefs: { type: integer }
                  charH: { type: number }
                  charW: { type: number }

  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: X-Api-Key
    bearerAuth:
      type: http
      scheme: bearer

security:
  - apiKey: []
  - bearerAuth: []
